<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baumarkt Finder</title>

  <style>
    :root {
      --bg: #2f2f2f;
      --panel: #3a3a3a;
      --panel-2: #444444;
      --text: #f3f3f3;
      --muted: #c9c9c9;
      --border: #5a5a5a;
      --red: #e53935;
      --black: #111111;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
    }

    .wrapper {
      max-width: 980px;
      margin: 40px auto;
      background: var(--panel);
      padding: 28px;
      border-radius: 16px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.28);
      border: 1px solid var(--border);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 24px;
      color: var(--red);
      font-size: 32px;
      letter-spacing: 0.3px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 20px;
    }

    input {
      padding: 15px 16px;
      font-size: 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      width: 100%;
      background: #2b2b2b;
      color: var(--white);
      outline: none;
    }

    input::placeholder {
      color: #a9a9a9;
    }

    input:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(229, 57, 53, 0.15);
    }

    button {
      padding: 15px 16px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: var(--red);
      color: var(--white);
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      opacity: 0.95;
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    #status {
      margin-top: 8px;
      margin-bottom: 22px;
      font-size: 15px;
      color: var(--muted);
      min-height: 20px;
    }

    #results {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

   .result-card {
  display: flex;
  justify-content: space-between;
  align-items: stretch;
  gap: 20px;
  padding: 18px 20px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--panel-2);
  min-height: 180px;
}

.result-content {
  flex: 1;
  min-width: 0;
  display: flex;
  align-items: flex-start;
}

.result-left {
  flex: 1;
  min-width: 0;
}

.result-logo-slot {
  width: 180px;
  min-width: 180px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.store-logo {
  width: 120px;
  height: 120px;
  object-fit: contain;
  display: block;
}

.store-logo-fallback {
  width: 120px;
  height: 120px;
  border-radius: 16px;
  border: 1px solid #6a6a6a;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 38px;
  background: rgba(255, 255, 255, 0.04);
  color: #d8d8d8;
}

    .result-name {
      font-size: 19px;
      font-weight: bold;
      margin-bottom: 8px;
      color: var(--white);
    }

    .result-address {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 8px;
      line-height: 1.45;
    }

    .result-product {
      color: var(--white);
      font-size: 14px;
      margin-bottom: 8px;
    }

    .result-meta {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      font-size: 14px;
      font-weight: bold;
    }

    .distance-km {
      color: var(--black);
      background: #f0f0f0;
      padding: 6px 10px;
      border-radius: 999px;
    }

    .time-min {
      color: var(--red);
      background: #fff3f3;
      padding: 6px 10px;
      border-radius: 999px;
    }

    #map {
      display: none;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }

 @media (max-width: 900px) {
  .result-card {
    flex-direction: column;
    min-height: auto;
  }

  .result-logo-slot {
    width: 100%;
    min-width: 100%;
    justify-content: flex-start;
    padding-top: 4px;
  }

  .store-logo,
  .store-logo-fallback {
    width: 90px;
    height: 90px;
  }
}

.price-box {
  display: inline-block;
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 14px;
  font-weight: bold;
  color: #1f8f47;
  background: #e8f8ee;
  margin-top: 8px;
}
}
  </style>
</head>
<body>
  <div class="wrapper">
    <h1>Baumarkt Finder</h1>

    <form id="searchForm" class="form-group">
     <input
  id="locationInput"
  type="text"
  placeholder="Straße oder Adresse in Deutschland eingeben..."
  autocomplete="off"
/>

<input
  id="productInput"
  type="text"
  placeholder="Produkt oder Material eingeben, z. B. Rigips, Zement, Schrauben..."
/>

<div id="productSuggestions" class="suggestions-box"></div>
      <button id="searchButton" type="submit">Suchen</button>
    </form>

    <div id="status">Bereit</div>
    <div id="results"></div>
    <div id="map"></div>
  </div>

  <script>
    let map;
    let geocoder;
    let placesService;
    let distanceMatrixService;
    let autocomplete;
    let selectedPlace = null;

    const allowedNames = [
      "OBI",
      "Hornbach",
      "Bauhaus",
      "toom",
      "hagebau",
      "Raab Karcher",
      "Späth",
      "Späth-Knoll",
      "BayWa",
      "Würth"
    ];

    function initMap() {
      const start = { lat: 50.1109, lng: 8.6821 };

      map = new google.maps.Map(document.getElementById("map"), {
        center: start,
        zoom: 11
      });

      geocoder = new google.maps.Geocoder();
      placesService = new google.maps.places.PlacesService(map);
      distanceMatrixService = new google.maps.DistanceMatrixService();

      const locationInput = document.getElementById("locationInput");

      autocomplete = new google.maps.places.Autocomplete(locationInput, {
        componentRestrictions: { country: ["de"] },
        fields: ["formatted_address", "geometry", "name"],
        types: ["address"]
      });

      autocomplete.addListener("place_changed", () => {
        const place = autocomplete.getPlace();

        if (!place || !place.geometry || !place.geometry.location) {
          selectedPlace = null;
          return;
        }

        selectedPlace = place;

        if (place.formatted_address) {
          locationInput.value = place.formatted_address;
        }
      });

      locationInput.addEventListener("input", () => {
        selectedPlace = null;
      });

      document.getElementById("searchForm").addEventListener("submit", async function (e) {
        e.preventDefault();
        await search();
      });
    }

    function geocodeAddress(address) {
      return new Promise((resolve, reject) => {
        geocoder.geocode(
          {
            address: address,
            componentRestrictions: { country: "DE" }
          },
          (results, status) => {
            if (status !== "OK" || !results || !results[0]) {
              reject(new Error("Adresse nicht gefunden"));
              return;
            }
            resolve(results[0]);
          }
        );
      });
    }

    function nearbySearch(request) {
      return new Promise((resolve, reject) => {
        placesService.nearbySearch(request, (results, status) => {
          if (status !== google.maps.places.PlacesServiceStatus.OK || !results) {
            reject(new Error("Keine Baumärkte gefunden"));
            return;
          }
          resolve(results);
        });
      });
    }

    function getAirDistanceKm(origin, destination) {
      const R = 6371;
      const dLat = (destination.lat() - origin.lat()) * Math.PI / 180;
      const dLng = (destination.lng() - origin.lng()) * Math.PI / 180;
      const lat1 = origin.lat() * Math.PI / 180;
      const lat2 = destination.lat() * Math.PI / 180;

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.sin(dLng / 2) * Math.sin(dLng / 2) *
        Math.cos(lat1) * Math.cos(lat2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function getDistanceMatrix(origin, destinations) {
  return new Promise((resolve) => {
    distanceMatrixService.getDistanceMatrix(
      {
        origins: [origin],
        destinations: destinations,
        travelMode: google.maps.TravelMode.DRIVING,
        unitSystem: google.maps.UnitSystem.METRIC,
        drivingOptions: {
          departureTime: new Date()
        }
      },
      (response, status) => {
        if (
          status !== "OK" ||
          !response ||
          !response.rows ||
          !response.rows[0] ||
          !response.rows[0].elements
        ) {
          resolve(null);
          return;
        }

        resolve(response.rows[0].elements);
      }
    );
  });
}

    function formatKmFromMeters(meters) {
      return (meters / 1000).toFixed(1).replace(".", ",");
    }
function getStoreLogoByName(storeName) {
  const name = (storeName || "").toLowerCase();

  if (name.includes("obi")) return "imagesobi.jpg";
  if (name.includes("hornbach")) return "imageshornbach.png";
  if (name.includes("bauhaus")) return "bauhaus.png";
  if (name.includes("toom")) return "toom.webp";
  if (name.includes("hagebau")) return "hagebau.jpg";
  if (name.includes("baywa")) return "baywa.png";
  if (name.includes("würth") || name.includes("wuerth")) return "würth.png";
  if (name.includes("raab")) return "raabkarcher.png";
  if (name.includes("späth") || name.includes("spaeth")) return "späthknoll.jpg";

  return null;
}

function createStoreLogoHtml(storeName) {
  const logoPath = getStoreLogoByName(storeName);

  if (logoPath) {
    return `
      <img
        class="store-logo"
        src="${logoPath}"
        alt="${escapeHtml(storeName)} Logo"
        onerror="this.outerHTML='<div class=&quot;store-logo-fallback&quot;>🏬</div>'"
      />
    `;
  }

  return `<div class="store-logo-fallback">🏬</div>`;
}
    async function search() {
      const location = document.getElementById("locationInput").value.trim();
      const product = document.getElementById("productInput").value.trim();
      const resultsEl = document.getElementById("results");
      const statusEl = document.getElementById("status");
      const searchButton = document.getElementById("searchButton");

      if (!location) {
        alert("Bitte eine Adresse eingeben");
        return;
      }

      statusEl.innerText = "Suche Baumärkte in Ihrer Nähe...";
      resultsEl.innerHTML = "";
      searchButton.disabled = true;

      try {
        let origin;

        if (
          selectedPlace &&
          selectedPlace.geometry &&
          selectedPlace.geometry.location &&
          selectedPlace.formatted_address === location
        ) {
          origin = selectedPlace.geometry.location;
        } else {
          const geocodeResult = await geocodeAddress(location);
          origin = geocodeResult.geometry.location;
        }

        const request = {
          location: origin,
          rankBy: google.maps.places.RankBy.DISTANCE,
          keyword: "Baumarkt"
        };

        const rawPlaces = await nearbySearch(request);

        const filteredPlaces = rawPlaces
          .filter(place => place.geometry && place.geometry.location)
          .filter(place => {
            const name = (place.name || "").toLowerCase();
            return allowedNames.some(allowed => name.includes(allowed.toLowerCase()));
          })
          .map(place => ({
            ...place,
            airDistanceKm: getAirDistanceKm(origin, place.geometry.location)
          }))
          .sort((a, b) => a.airDistanceKm - b.airDistanceKm)
          .slice(0, 10);

        if (filteredPlaces.length === 0) {
          statusEl.innerText = "Keine passenden Baumärkte gefunden";
          searchButton.disabled = false;
          return;
        }

const destinations = filteredPlaces.map(place => place.geometry.location);
const matrixElements = await getDistanceMatrix(origin, destinations);

const enrichedPlaces = filteredPlaces
  .map((place, index) => {
    const fallbackDistanceMeters = Math.round(place.airDistanceKm * 1000);

    if (!matrixElements) {
      return {
        ...place,
        distanceText: `${place.airDistanceKm.toFixed(1).replace(".", ",")} km`,
        distanceMeters: fallbackDistanceMeters,
        durationText: "nicht verfügbar",
        durationMinutes: null
      };
    }

    const routeInfo = matrixElements[index];

    if (!routeInfo || routeInfo.status !== "OK") {
      return {
        ...place,
        distanceText: `${place.airDistanceKm.toFixed(1).replace(".", ",")} km`,
        distanceMeters: fallbackDistanceMeters,
        durationText: "nicht verfügbar",
        durationMinutes: null
      };
    }

    const distanceMeters = routeInfo.distance?.value ?? fallbackDistanceMeters;
    const durationSeconds = routeInfo.duration?.value ?? null;

    return {
      ...place,
      distanceText: routeInfo.distance?.text || `${place.airDistanceKm.toFixed(1).replace(".", ",")} km`,
      distanceMeters,
      durationText: routeInfo.duration?.text || "nicht verfügbar",
      durationMinutes: durationSeconds ? Math.round(durationSeconds / 60) : null
    };
  })
  .sort((a, b) => a.distanceMeters - b.distanceMeters);

        resultsEl.innerHTML = "";

        enrichedPlaces.forEach((place) => {
          const kmText = place.distanceMeters
            ? `${formatKmFromMeters(place.distanceMeters)} km`
            : place.distanceText;

          const minuteText = place.durationMinutes
            ? `${place.durationMinutes} min`
            : place.durationText;

          const div = document.createElement("div");
          div.className = "result-card";
          div.innerHTML = `
  <div class="result-content">
    <div class="result-left">
      <div class="result-name">${escapeHtml(place.name || "Unbekannter Baumarkt")}</div>
      <div class="result-address">${escapeHtml(place.vicinity || "Adresse nicht verfügbar")}</div>
      <div class="result-product">Produkt: ${escapeHtml(product || "nicht angegeben")}</div>
      <div class="result-meta">
        <span class="distance-km">Entfernung: ${escapeHtml(kmText)}</span>
        <span class="time-min">Fahrzeit: ${escapeHtml(minuteText)}</span>
      </div>
    </div>
  </div>

  <div class="result-logo-slot">
    ${createStoreLogoHtml(place.name || "Baumarkt")}
  </div>
`;
          resultsEl.appendChild(div);
        });

      if (matrixElements) {
  statusEl.innerText = `${enrichedPlaces.length} nächstgelegene Baumärkte gefunden`;
} else {
  statusEl.innerText = `${enrichedPlaces.length} nächstgelegene Baumärkte gefunden – Fahrzeit derzeit nicht verfügbar`;
}
      } catch (error) {
        console.error(error);
        statusEl.innerText = error.message || "Fehler bei der Suche";
      } finally {
        searchButton.disabled = false;
      }
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

        window.initMap = initMap;
  </script>

  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA7RCu62ICAEdQkKOPdmueVaqpW6BFhM-M&libraries=places&callback=initMap"
    async
    defer
  ></script>

  <script src="materials-database.js"></script>
  <script src="generate-prices.js"></script>
  <script src="product-compare.js"></script>
</body>
</html>
