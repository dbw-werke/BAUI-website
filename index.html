<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #3b3b3b;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start; /* OBEN statt Mitte */
    }

    .wrapper {
      width: 100%;
      max-width: 1000px;
      padding-top: 80px; /* Abstand nach oben */
      text-align: center;
    }

    .logo {
      color: #c62828;
      font-size: 120px;
      font-weight: 900;
      margin-bottom: 30px;
    }

    .search {
      width: 100%;
      height: 80px;
      border: none;
      border-radius: 18px;
      background: #4a4a4a;
      color: white;
      font-size: 24px;
      font-weight: bold;
      padding: 0 30px;
      outline: none;
    }

    .search::placeholder {
      color: #cfcfcf;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="logo">B</div>
    <input class="search" type="text" placeholder="Adresse eingeben" />
  </div>
</body>
</html>
