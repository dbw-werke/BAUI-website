<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baui.de</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #3b3b3b;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start; /* OBEN statt Mitte */
    }

    .wrapper {
      width: 100%;
      max-width: 1000px;
      padding-top: 80px; /* Abstand nach oben */
      text-align: center;
    }

    .logo {
      color: #c62828;
      font-size: 120px;
      font-weight: 900;
      margin-bottom: 30px;
    }

    .search {
      width: 100%;
      height: 80px;
      border: none;
      border-radius: 18px;
      background: #4a4a4a;
      color: white;
      font-size: 24px;
      font-weight: bold;
      padding: 0 30px;
      outline: none;
    }
.search-group {
  display: flex;
  flex-direction: column;
  gap: 18px;
  margin-bottom: 22px;
}

.search-box {
  width: 100%;
  height: 78px;
  border-radius: 18px;
  background: #4a4a4a;
  display: flex;
  align-items: center;
  padding: 0 22px;
}

.search-input {
  flex: 1;
  height: 100%;
  border: none;
  outline: none;
  background: transparent;
  color: white;
  font-size: 24px;
  font-weight: bold;
}

.search-input::placeholder {
  color: #cfcfcf;
}

.icon {
  font-size: 26px;
  margin-left: 12px;
}

.search-button {
  width: 100%;
  height: 70px;
  border: none;
  border-radius: 18px;
  background: #2e7d32;
  color: white;
  font-size: 26px;
  font-weight: bold;
  cursor: pointer;
}
    .search::placeholder {
      color: #cfcfcf;
    }
    
  </style>
</head>
<body>
<div class="wrapper">
  <div class="logo">B</div>

  <div class="search-group">
    <div class="search-box">
      <input class="search-input" type="text" placeholder="Adresse" />
      <span class="icon">📍</span>
    </div>

    <div class="search-box">
      <input class="search-input" type="text" placeholder="Produkt" />
      <span class="icon">🔧</span>
    </div>
  </div>

  <button class="search-button">Suche</button>
</div>
</body>
</html>
