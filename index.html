<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baumarkt Finder</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
    }

    .wrapper {
      max-width: 900px;
      margin: 40px auto;
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }

    input {
      padding: 14px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    button {
      padding: 14px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: black;
      color: white;
    }

    #status {
      margin-top: 16px;
      margin-bottom: 20px;
      font-size: 15px;
    }

    #results {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .result-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 16px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #fafafa;
    }

    .result-left {
      flex: 1;
    }

    .result-name {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .result-address {
      color: #555;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .result-distance {
      color: #222;
      font-size: 14px;
    }

    .result-right {
      min-width: 90px;
      text-align: right;
      font-weight: bold;
      font-size: 18px;
    }

    .hidden-map {
      display: none;
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <h1>Baumarkt Finder</h1>

    <form id="searchForm" class="form-group">
      <input id="locationInput" placeholder="Straße oder Adresse eingeben..." />
      <button id="searchButton" type="submit">Suchen</button>
    </form>

    <div id="status">Bereit</div>
    <div id="results"></div>

    <!-- versteckt, nur damit PlacesService sauber läuft -->
    <div id="map" class="hidden-map"></div>
  </div>

  <script>
    let map;
    let geocoder;
    let placesService;
    let RouteMatrix;

    async function initMap() {
      const start = { lat: 50.1109, lng: 8.6821 };

      map = new google.maps.Map(document.getElementById("map"), {
        center: start,
        zoom: 11,
      });

      geocoder = new google.maps.Geocoder();
      placesService = new google.maps.places.PlacesService(map);

      const routesLib = await google.maps.importLibrary("routes");
      RouteMatrix = routesLib.RouteMatrix;

      document.getElementById("searchForm").addEventListener("submit", function (e) {
        e.preventDefault();
        search();
      });
    }

    function geocodeAddress(address) {
      return new Promise((resolve, reject) => {
        geocoder.geocode({ address }, (results, status) => {
          if (status !== "OK" || !results[0]) {
            reject(new Error("Adresse nicht gefunden"));
            return;
          }
          resolve(results[0]);
        });
      });
    }

    function nearbySearch(request) {
      return new Promise((resolve, reject) => {
        placesService.nearbySearch(request, (results, status) => {
          if (status !== google.maps.places.PlacesServiceStatus.OK || !results) {
            reject(new Error("Keine Ergebnisse"));
            return;
          }
          resolve(results);
        });
      });
    }

    async function search() {
      const location = document.getElementById("locationInput").value.trim();
      const resultsEl = document.getElementById("results");
      const statusEl = document.getElementById("status");

      if (!location) {
        alert("Bitte eine Adresse eingeben");
        return;
      }

      statusEl.innerText = "Suche Baumärkte...";
      resultsEl.innerHTML = "";

      try {
        const geocodeResult = await geocodeAddress(location);
        const origin = geocodeResult.geometry.location;

        const request = {
          location: origin,
          rankBy: google.maps.places.RankBy.DISTANCE,
          keyword: "Baumarkt"
        };

        const rawPlaces = await nearbySearch(request);

        const allowedNames = [
          "OBI",
          "Hornbach",
          "Bauhaus",
          "toom",
          "hagebau",
          "Raab Karcher",
          "Späth",
          "Späth-Knoll",
          "BayWa",
          "Würth"
        ];

        const filteredPlaces = rawPlaces
          .filter(place => place.geometry && place.geometry.location)
          .filter(place => {
            const name = (place.name || "").toLowerCase();
            return allowedNames.some(allowed =>
              name.includes(allowed.toLowerCase())
            );
          });

        if (filteredPlaces.length === 0) {
          statusEl.innerText = "Keine passenden Baumärkte gefunden";
          return;
        }

        const matrixResult = await RouteMatrix.computeRouteMatrix({
          origins: [origin],
          destinations: filteredPlaces.map(place => place.geometry.location),
          travelMode: "DRIVING",
          routingPreference: "TRAFFIC_AWARE",
          units: google.maps.UnitSystem.METRIC,
          fields: ["distanceMeters", "durationMillis", "condition"]
        });

        const items = matrixResult.matrix.rows[0].items;

        const enrichedPlaces = filteredPlaces
          .map((place, index) => {
            const item = items[index];

            if (!item || item.condition !== "ROUTE_EXISTS") {
              return null;
            }

            return {
              ...place,
              distanceMeters: item.distanceMeters,
              durationMillis: item.durationMillis
            };
          })
          .filter(Boolean)
          .sort((a, b) => a.durationMillis - b.durationMillis);

        if (enrichedPlaces.length === 0) {
          statusEl.innerText = "Keine fahrbare Route zu den Treffern gefunden";
          return;
        }

        resultsEl.innerHTML = "";

        enrichedPlaces.forEach((place) => {
          const km = (place.distanceMeters / 1000).toFixed(1);
          const minutes = Math.round(place.durationMillis / 60000);

          const div = document.createElement("div");
          div.className = "result-card";
          div.innerHTML = `
            <div class="result-left">
              <div class="result-name">${place.name}</div>
              <div class="result-address">${place.vicinity || "Adresse nicht verfügbar"}</div>
              <div class="result-distance">Strecke: ${km} km</div>
            </div>
            <div class="result-right">${minutes} min</div>
          `;
          resultsEl.appendChild(div);
        });

        statusEl.innerText = `${enrichedPlaces.length} passende Baumärkte gefunden`;
      } catch (error) {
        console.error(error);
        statusEl.innerText = error.message || "Fehler bei der Suche";
      }
    }

    window.initMap = initMap;
  </script>

  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBTVyuWYu-6WUlzz_QEDfQUevcC-sduDqM&libraries=places,routes&callback=initMap"
    async
    defer
  ></script>
</body>
</html>
