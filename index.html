<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baumarkt Finder</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
    }

    .wrapper {
      max-width: 900px;
      margin: 40px auto;
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }

    input {
      padding: 14px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    button {
      padding: 14px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: black;
      color: white;
    }

    #status {
      margin-top: 16px;
    }

    #results {
      margin-top: 20px;
    }

    .result-card {
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    #map {
      width: 100%;
      height: 400px;
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <h1>Baumarkt Finder</h1>

    <div class="form-group">
      <input id="locationInput" placeholder="Adresse eingeben..." />
      <input id="materialInput" placeholder="Material eingeben..." />
      <button id="searchButton">Suchen</button>
    </div>

    <div id="status">Bereit</div>
    <div id="results"></div>
    <div id="map"></div>
  </div>

  <script>
    let map;
    let geocoder;
    let service;
    let markers = [];

    function initMap() {
      const start = { lat: 50.1109, lng: 8.6821 };

      map = new google.maps.Map(document.getElementById("map"), {
        center: start,
        zoom: 11
      });

      geocoder = new google.maps.Geocoder();
      service = new google.maps.places.PlacesService(map);

      document.getElementById("searchButton").addEventListener("click", search);
    }

    function clearMarkers() {
      markers.forEach(m => m.setMap(null));
      markers = [];
    }

    function addMarker(pos, title) {
      const marker = new google.maps.Marker({
        position: pos,
        map,
        title
      });
      markers.push(marker);
    }

    function search() {
      const location = document.getElementById("locationInput").value;

      if (!location) {
        alert("Adresse eingeben");
        return;
      }

      document.getElementById("status").innerText = "Suche...";

      geocoder.geocode({ address: location }, (res, status) => {
        if (status !== "OK") {
          document.getElementById("status").innerText = "Adresse nicht gefunden";
          return;
        }
console.log(res[0].formatted_address);
        const loc = res[0].geometry.location;

        map.setCenter(loc);
        map.setZoom(13);

        clearMarkers();
        addMarker(loc, "Dein Standort");

       const request = {
  location: loc,
  rankBy: google.maps.places.RankBy.DISTANCE,
  keyword: "Baumarkt"
};

        service.nearbySearch(request, (results, status) => {
          if (status !== google.maps.places.PlacesServiceStatus.OK) {
            document.getElementById("status").innerText = "Keine Ergebnisse";
            return;
          }

          const list = document.getElementById("results");
          list.innerHTML = "";

         // Entfernung berechnen
function getDistance(a, b) {
  const R = 6371;
  const dLat = (b.lat() - a.lat()) * Math.PI / 180;
  const dLng = (b.lng() - a.lng()) * Math.PI / 180;

  const lat1 = a.lat() * Math.PI / 180;
  const lat2 = b.lat() * Math.PI / 180;

  const x = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.sin(dLng/2) * Math.sin(dLng/2) *
            Math.cos(lat1) * Math.cos(lat2);

  const d = 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));

  return R * d;
}

// Entfernung hinzufügen
const sorted = results.map(place => {
  return {
    ...place,
    distance: getDistance(loc, place.geometry.location)
  };
});

// Sortieren
sorted.sort((a, b) => a.distance - b.distance);

// Anzeigen
const list = document.getElementById("results");
list.innerHTML = "";

sorted.forEach((place, i) => {
  addMarker(place.geometry.location, place.name);

  const div = document.createElement("div");
  div.className = "result-card";

  div.innerHTML = `
    <b>${i+1}. ${place.name}</b><br>
    ${place.vicinity}<br>
    Entfernung: ${place.distance.toFixed(2)} km
  `;

  list.appendChild(div);
});

          document.getElementById("status").innerText = "Baumärkte gefunden";
        });
      });
    }

    window.initMap = initMap;
  </script>

  <!-- 🔥 HIER DEIN API KEY EINSETZEN -->
  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA7RCu62ICAEdQkKOPdmueVaqpW6BFhM-M&libraries=places&callback=initMap"
    async
    defer
  ></script>

</body>
</html>
