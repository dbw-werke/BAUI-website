<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baumarkt Finder</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
    }

    .wrapper {
      max-width: 900px;
      margin: 40px auto;
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }

    input {
      padding: 14px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      width: 100%;
      box-sizing: border-box;
    }

    button {
      padding: 14px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: black;
      color: white;
    }

    #status {
      margin-top: 16px;
      margin-bottom: 20px;
      font-size: 15px;
    }

    #results {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .result-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 16px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #fafafa;
    }

    .result-left {
      flex: 1;
    }

    .result-name {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .result-address {
      color: #555;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .result-product {
      color: #222;
      font-size: 14px;
    }

    .result-right {
      min-width: 100px;
      text-align: right;
      font-weight: bold;
      font-size: 18px;
    }

    #map {
      display: none;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <h1>Baumarkt Finder</h1>

    <form id="searchForm" class="form-group">
      <input
        id="locationInput"
        type="text"
        placeholder="Straße oder Adresse in Deutschland eingeben..."
        autocomplete="off"
      />
      <input
        id="productInput"
        type="text"
        placeholder="Produkt oder Material eingeben, z. B. Rigips, Zement, Schrauben..."
      />
      <button id="searchButton" type="submit">Suchen</button>
    </form>

    <div id="status">Bereit</div>
    <div id="results"></div>
    <div id="map"></div>
  </div>

  <script>
    let map;
    let geocoder;
    let placesService;
    let autocomplete;

    function initMap() {
      const start = { lat: 50.1109, lng: 8.6821 };

      map = new google.maps.Map(document.getElementById("map"), {
        center: start,
        zoom: 11
      });

      geocoder = new google.maps.Geocoder();
      placesService = new google.maps.places.PlacesService(map);

      const locationInput = document.getElementById("locationInput");

      autocomplete = new google.maps.places.Autocomplete(locationInput, {
        componentRestrictions: { country: "de" },
        fields: ["formatted_address", "geometry", "name"],
        types: ["address"]
      });

      autocomplete.addListener("place_changed", () => {
        const place = autocomplete.getPlace();
        if (place && place.formatted_address) {
          locationInput.value = place.formatted_address;
        }
      });

      document.getElementById("searchForm").addEventListener("submit", function (e) {
        e.preventDefault();
        search();
      });
    }

    function geocodeAddress(address) {
      return new Promise((resolve, reject) => {
        geocoder.geocode(
          {
            address: address,
            componentRestrictions: { country: "DE" }
          },
          (results, status) => {
            if (status !== "OK" || !results || !results[0]) {
              reject(new Error("Adresse nicht gefunden"));
              return;
            }
            resolve(results[0]);
          }
        );
      });
    }

    function nearbySearch(request) {
      return new Promise((resolve, reject) => {
        placesService.nearbySearch(request, (results, status) => {
          if (status !== google.maps.places.PlacesServiceStatus.OK || !results) {
            reject(new Error("Keine Ergebnisse"));
            return;
          }
          resolve(results);
        });
      });
    }

    function getDistanceKm(origin, destination) {
      const R = 6371;
      const dLat = (destination.lat() - origin.lat()) * Math.PI / 180;
      const dLng = (destination.lng() - origin.lng()) * Math.PI / 180;
      const lat1 = origin.lat() * Math.PI / 180;
      const lat2 = destination.lat() * Math.PI / 180;

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.sin(dLng / 2) * Math.sin(dLng / 2) *
        Math.cos(lat1) * Math.cos(lat2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function estimateMinutes(distanceKm) {
      return Math.max(3, Math.round(distanceKm * 2.2));
    }

    async function search() {
      const location = document.getElementById("locationInput").value.trim();
      const product = document.getElementById("productInput").value.trim();
      const resultsEl = document.getElementById("results");
      const statusEl = document.getElementById("status");

      if (!location) {
        alert("Bitte eine Adresse eingeben");
        return;
      }

      statusEl.innerText = "Suche Baumärkte...";
      resultsEl.innerHTML = "";

      try {
        const geocodeResult = await geocodeAddress(location);
        const origin = geocodeResult.geometry.location;

        const request = {
          location: origin,
          rankBy: google.maps.places.RankBy.DISTANCE,
          keyword: "Baumarkt"
        };

        const rawPlaces = await nearbySearch(request);

        const allowedNames = [
          "OBI",
          "Hornbach",
          "Bauhaus",
          "toom",
          "hagebau",
          "Raab Karcher",
          "Späth",
          "Späth-Knoll",
          "BayWa",
          "Würth"
        ];

        const nearestPlaces = rawPlaces
          .filter(place => place.geometry && place.geometry.location)
          .filter(place => {
            const name = (place.name || "").toLowerCase();
            return allowedNames.some(allowed =>
              name.includes(allowed.toLowerCase())
            );
          })
          .map(place => ({
            ...place,
            distanceKm: getDistanceKm(origin, place.geometry.location)
          }))
          .sort((a, b) => a.distanceKm - b.distanceKm)
          .slice(0, 10);

        if (nearestPlaces.length === 0) {
          statusEl.innerText = "Keine passenden Baumärkte gefunden";
          return;
        }

        resultsEl.innerHTML = "";

        nearestPlaces.forEach((place) => {
          const minutes = estimateMinutes(place.distanceKm);

          const div = document.createElement("div");
          div.className = "result-card";
          div.innerHTML = `
            <div class="result-left">
              <div class="result-name">${place.name}</div>
              <div class="result-address">${place.vicinity || "Adresse nicht verfügbar"}</div>
              <div class="result-product">
                Produkt: ${product ? product : "nicht angegeben"}
              </div>
            </div>
            <div class="result-right">${minutes} min</div>
          `;
          resultsEl.appendChild(div);
        });

        statusEl.innerText = `${nearestPlaces.length} nächstgelegene Baumärkte gefunden`;
      } catch (error) {
        console.error(error);
        statusEl.innerText = error.message || "Fehler bei der Suche";
      }
    }

    window.initMap = initMap;
  </script>

  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA7RCu62ICAEdQkKOPdmueVaqpW6BFhM-M&libraries=places&callback=initMap"
    async
    defer
  ></script>
</body>
</html>
